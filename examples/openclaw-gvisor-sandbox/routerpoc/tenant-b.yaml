# Tenant B: mirror of tenant-a.yaml with -b suffixes and its own gateway token.
# See tenant-a.yaml for the routing / labeling rationale.
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config-b
data:
  # See tenant-a.yaml for rationale. Python router forwards Origin unchanged
  # on WS, so this tight allowlist matches the browser's http://localhost:8080.
  openclaw.json: |
    {
      "gateway": {
        "controlUi": {
          "allowedOrigins": [
              "http://localhost:8080",
              "http://127.0.0.1:8080"
            ]
        }
      }
    }
---
apiVersion: extensions.agents.x-k8s.io/v1beta1
kind: SandboxTemplate
metadata:
  name: openclaw-template-b
spec:
  podTemplate:
    metadata:
      labels:
        sandbox: openclaw-template-b-sandbox
    spec:
      runtimeClassName: gvisor
      dnsPolicy: ClusterFirst
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        runAsNonRoot: true
      initContainers:
        - name: init-config
          image: ghcr.io/openclaw/openclaw:2026.3.23
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command:
            - sh
            - -c
            - cp /etc/openclaw-readonly/openclaw.json /etc/openclaw/openclaw.json
          volumeMounts:
            - name: cm-volume
              mountPath: /etc/openclaw-readonly
            - name: openclaw-etc-writable
              mountPath: /etc/openclaw
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:2026.3.23
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          env:
            - name: OPENCLAW_GATEWAY_TOKEN
              value: "dummy-token-tenant-b"
            - name: OPENCLAW_CONFIG_PATH
              value: "/etc/openclaw/openclaw.json"
            - name: HOME
              value: "/workspace"
          command:
            - sh
            - -c
            - |
              node dist/index.js gateway --bind=lan --port 18789 --allow-unconfigured --verbose
          ports:
            - containerPort: 18789
            - containerPort: 18790
          volumeMounts:
            - mountPath: /workspace/.openclaw
              name: workspaces-pvc
            - mountPath: /etc/openclaw
              name: openclaw-etc-writable
            - mountPath: /workspace
              name: home-dir
      volumes:
        - name: cm-volume
          configMap:
            name: openclaw-config-b
        - name: openclaw-etc-writable
          emptyDir: {}
        - name: home-dir
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: workspaces-pvc
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
---
apiVersion: extensions.agents.x-k8s.io/v1beta1
kind: SandboxWarmPool
metadata:
  name: openclaw-warmpool-b
spec:
  replicas: 1
  sandboxTemplateRef:
    name: openclaw-template-b
---
apiVersion: extensions.agents.x-k8s.io/v1beta1
kind: SandboxClaim
metadata:
  name: openclaw-claim-b
spec:
  warmPoolRef:
    name: openclaw-warmpool-b
  additionalPodMetadata:
    labels:
      sandbox.users.io/tenant: tenant-b
---
apiVersion: v1
kind: Service
metadata:
  name: tenant-b
spec:
  type: ClusterIP
  selector:
    sandbox.users.io/tenant: tenant-b
  ports:
    - name: gateway
      port: 18789
      targetPort: 18789
