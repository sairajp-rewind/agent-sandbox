apiVersion: extensions.agents.x-k8s.io/v1beta1
kind: SandboxTemplate
metadata:
  name: openclaw-template
spec:
  podTemplate:
    metadata:
      labels:
        sandbox: openclaw-template-sandbox
    spec:
      runtimeClassName: gvisor
      dnsPolicy: ClusterFirst
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
      initContainers:
        - name: init-config
          image: ghcr.io/openclaw/openclaw:2026.3.23
          command:
            - sh
            - -c
            - cp /etc/openclaw-readonly/openclaw.json /etc/openclaw/openclaw.json
          volumeMounts:
            - name: cm-volume
              mountPath: /etc/openclaw-readonly
            - name: openclaw-etc-writable
              mountPath: /etc/openclaw
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:2026.3.23
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: true
            readOnlyRootFilesystem: false
            runAsNonRoot: false
          env:
            - name: OPENCLAW_GATEWAY_TOKEN
              value: "dummy-token-for-sandbox"
            - name: OPENCLAW_CONFIG_PATH
              value: "/etc/openclaw/openclaw.json"
          command:
            - sh
            - -c
            - |
              ssh-keygen -A
              /usr/sbin/sshd -D &
              node dist/index.js gateway --bind=lan --port 18789 --allow-unconfigured --verbose
          ports:
            - containerPort: 18789
            - containerPort: 18790
          volumeMounts:
            - mountPath: /root/.openclaw
              name: workspaces-pvc
            - mountPath: /etc/openclaw
              name: openclaw-etc-writable
      volumes:
        - name: cm-volume
          configMap:
            name: openclaw-config
        - name: openclaw-etc-writable
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: workspaces-pvc
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
